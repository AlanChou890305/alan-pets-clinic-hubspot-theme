<section class="trust-badges" aria-label="Why choose us">
  <div class="container">
    <div class="trust-badges__grid">
      {% for badge in module.badges %}
        <div class="trust-badge">
          <div class="trust-badge__icon" aria-hidden="true">{{ badge.icon }}</div>
          <div>
            <div class="trust-badge__value">{{ badge.value }}</div>
            <div class="trust-badge__label">{{ badge.label }}</div>
            {% if badge.description %}
              <div class="trust-badge__desc">{{ badge.description }}</div>
            {% endif %}
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
