<section class="section section--sm how-it-works" style="background: var(--color-bg-soft);">
  <div class="container">
    <div class="section-header">
      {% if module.section_label %}
        <span class="section-header__eyebrow">{{ module.section_label }}</span>
      {% endif %}
      <h2 class="section-header__title">{{ module.section_title }}</h2>
    </div>

    <div class="how-it-works__grid">
      {% for step in module.steps %}
        <div class="how-step">
          <div class="how-step__number">{{ step.number }}</div>
          <div class="how-step__emoji" aria-hidden="true">{{ step.emoji }}</div>
          <h3 class="how-step__title">{{ step.title }}</h3>
          <p class="how-step__desc">{{ step.description }}</p>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
